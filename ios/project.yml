name: AmuxApp
options:
  bundleIdPrefix: io.amux
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.9
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    PRODUCT_BUNDLE_IDENTIFIER: com.EthanSteininger.nextup
    DEVELOPMENT_TEAM: "M225B6YA42"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
    SWIFT_STRICT_CONCURRENCY: minimal
    CODE_SIGN_STYLE: Manual
  configs:
    Debug:
      CODE_SIGN_IDENTITY: "Apple Development"
      PROVISIONING_PROFILE_SPECIFIER: ""
    Release:
      CODE_SIGN_IDENTITY: "Apple Distribution"
      PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.EthanSteininger.nextup"

targets:
  AmuxApp:
    type: application
    platform: iOS
    sources:
      - path: AmuxApp/Sources
    resources:
      - path: AmuxApp/Assets.xcassets
    info:
      path: AmuxApp/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSFaceIDUsageDescription: "Used to protect access to your amux dashboard"
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: AmuxApp/AmuxApp.entitlements
      properties:
        com.apple.security.application-groups: []
