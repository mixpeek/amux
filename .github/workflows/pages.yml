name: Deploy amux.io

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/release-notes/notes.json'
      - 'amux-server.py'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from git log
        run: |
          python3 - <<'EOF'
          import json, subprocess, re, os
          from datetime import datetime

          # Load manual enrichments (descriptions, tags, videos) keyed by hash
          enrichments = {}
          manual_path = "docs/release-notes/notes.json"
          if os.path.exists(manual_path):
              with open(manual_path) as f:
                  for e in json.load(f):
                      enrichments[e["hash"]] = e

          # Parse git log
          result = subprocess.run(
              ["git", "log", "--pretty=format:%H%x00%h%x00%ad%x00%s", "--date=short"],
              capture_output=True, text=True
          )

          entries = []
          SKIP_TYPES = {"chore", "test", "ci", "build", "style", "refactor"}
          CONV = re.compile(r'^(feat|fix|docs|chore|test|ci|build|style|refactor|perf)(?:\([^)]+\))?!?:\s*', re.I)

          for line in result.stdout.strip().split("\n"):
              if not line.strip():
                  continue
              parts = line.split("\x00", 3)
              if len(parts) != 4:
                  continue
              full_hash, short, date, subject = parts

              # Skip merge commits
              if subject.startswith("Merge "):
                  continue

              # Determine type
              m = CONV.match(subject)
              commit_type = m.group(1).lower() if m else "chore"
              title = CONV.sub("", subject).strip()
              # Capitalize first letter
              if title:
                  title = title[0].upper() + title[1:]

              # Skip low-signal types unless manually enriched
              if commit_type in SKIP_TYPES and full_hash not in enrichments:
                  continue

              entry = {"hash": full_hash, "short": short, "title": title, "date": date, "type": commit_type, "tags": [], "description": "", "video": None}

              # Merge in manual enrichments
              if full_hash in enrichments:
                  manual = enrichments[full_hash]
                  entry["tags"] = manual.get("tags", [])
                  entry["description"] = manual.get("description", "")
                  entry["video"] = manual.get("video")
                  if manual.get("title"):
                      entry["title"] = manual["title"]

              entries.append(entry)

          os.makedirs("site/changelog", exist_ok=True)
          with open("site/changelog/notes.json", "w") as f:
              json.dump(entries, f, indent=2)

          print(f"Generated {len(entries)} changelog entries")
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
